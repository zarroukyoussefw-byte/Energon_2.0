# Decap CMS — GitHub OAuth Proxy
# Deploy this as a separate service on Coolify
# Environment variables to configure in Coolify dashboard:
#   OAUTH_CLIENT_ID     = <your GitHub OAuth App Client ID>
#   OAUTH_CLIENT_SECRET = <your GitHub OAuth App Client Secret>
#   ORIGINS             = https://yourdomain.com

services:
  decap-oauth:
    image: itsmejoeeey/docker-decap-cms-standalone:latest
    container_name: decap-oauth
    restart: unless-stopped
    ports:
      - "8585:8585"
    environment:
      - OAUTH_CLIENT_ID=${OAUTH_CLIENT_ID}
      - OAUTH_CLIENT_SECRET=${OAUTH_CLIENT_SECRET}
      - ORIGINS=${ORIGINS}
