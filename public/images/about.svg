<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c5ce7;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#00d2a0;stop-opacity:0.1"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg2)"/>
  <circle cx="600" cy="200" r="180" fill="url(#accent2)" opacity="0.5"/>
  <circle cx="200" cy="450" r="120" fill="#6c5ce7" opacity="0.08"/>
  <!-- People silhouettes (abstract) -->
  <g transform="translate(200, 250)" opacity="0.3">
    <circle cx="0" cy="0" r="25" fill="#a29bfe"/>
    <rect x="-20" y="30" width="40" height="60" rx="10" fill="#a29bfe"/>
    <circle cx="80" cy="-10" r="25" fill="#6c5ce7"/>
    <rect x="60" y="20" width="40" height="60" rx="10" fill="#6c5ce7"/>
    <circle cx="160" cy="5" r="25" fill="#00d2a0"/>
    <rect x="140" y="35" width="40" height="60" rx="10" fill="#00d2a0"/>
    <circle cx="240" cy="-5" r="25" fill="#a29bfe"/>
    <rect x="220" y="25" width="40" height="60" rx="10" fill="#a29bfe"/>
  </g>
  <text x="400" y="480" text-anchor="middle" fill="#a29bfe" font-family="system-ui,sans-serif" font-size="16" opacity="0.6">Votre image équipe — 800×600</text>
</svg>
