<svg xmlns="http://www.w3.org/2000/svg" width="250" height="56" viewBox="0 0 250 56" fill="none">
  <defs>
    <linearGradient id="prune" x1="8" y1="0" x2="48" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a0535"/>
      <stop offset="50%" stop-color="#3d0f6e"/>
      <stop offset="100%" stop-color="#5b1fa8"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="28" y2="36" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.38"/>
      <stop offset="45%" stop-color="#a855f7" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="border" x1="0" y1="0" x2="56" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.75"/>
      <stop offset="50%" stop-color="#7c3aed" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#4c1d95" stop-opacity="0.08"/>
    </linearGradient>
  </defs>

  <!-- Halo -->
  <rect x="1" y="1" width="54" height="54" rx="13" fill="#4c1d95" opacity="0.35"/>
  <!-- Fond prune -->
  <rect x="3" y="3" width="50" height="50" rx="12" fill="url(#prune)"/>
  <!-- Reflet -->
  <rect x="3" y="3" width="50" height="50" rx="12" fill="url(#shine)"/>
  <!-- Bordure -->
  <rect x="3.5" y="3.5" width="49" height="49" rx="11.5" fill="none" stroke="url(#border)" stroke-width="0.75"/>

  <!-- ENERGON centré dans le carré -->
  <text
    x="28"
    y="28"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="system-ui,-apple-system,sans-serif"
    font-weight="800"
    font-size="9"
    fill="white"
    opacity="0.95"
    textLength="36"
    lengthAdjust="spacingAndGlyphs"
  >ENERGON</text>

  <!-- Séparateur -->
  <line x1="70" y1="14" x2="70" y2="42" stroke="#2a2a40" stroke-width="1"/>

  <!-- Wordmark ENERGON -->
  <text
    x="82"
    y="23"
    font-family="system-ui,-apple-system,sans-serif"
    font-weight="700"
    font-size="14"
    fill="#e4e2f0"
    letter-spacing="1"
  >ENERGON</text>

  <!-- Tagline -->
  <text
    x="82"
    y="39"
    font-family="system-ui,-apple-system,sans-serif"
    font-weight="400"
    font-size="9"
    fill="#7a7894"
    textLength="118"
    lengthAdjust="spacingAndGlyphs"
  >SOLUTIONS DIGITALES</text>
</svg>
